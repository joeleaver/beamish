<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="node" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#A8F8ED"/>
      <stop offset="55%" stop-color="#34E1D0"/>
      <stop offset="100%" stop-color="#11B0A0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- transparent background (no tile) -->

  <!-- soft glow under the node -->
  <circle cx="256" cy="256" r="98" fill="#34E1D0" opacity="0.45" filter="url(#glow)"/>

  <!-- concentric signal rings (emanating, fading outward) -->
  <g fill="none" stroke="#34E1D0">
    <circle cx="256" cy="256" r="232" stroke-width="10" opacity="0.22"/>
    <circle cx="256" cy="256" r="180" stroke-width="11" opacity="0.42"/>
    <circle cx="256" cy="256" r="132" stroke-width="12" opacity="0.68"/>
  </g>

  <!-- node -->
  <circle cx="256" cy="256" r="92" fill="url(#node)"/>

  <!-- down arrow = receive -->
  <g stroke="#06231C" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="256" y1="206" x2="256" y2="304"/>
    <polyline points="216,266 256,306 296,266"/>
  </g>
</svg>
