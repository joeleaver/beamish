name: release

# Build native Linux packages on a version tag (e.g. `git tag v0.1.0 && git push --tags`)
# and attach them to a GitHub Release. Also runnable manually for testing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    # 22.04 links against an older glibc, so the artifacts run on a wide range
    # of distros (newer ones are forward-compatible).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # System libraries needed to build the GUI + Bluetooth/tray stack.
      # (Adjust here if the first run reports a missing -dev package.)
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config protobuf-compiler \
            libdbus-1-dev libudev-dev libssl-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libgtk-3-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Install packaging tools
        run: |
          cargo install cargo-deb || true
          cargo install cargo-generate-rpm || true

      - name: Build .deb
        run: cargo deb --no-build

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Build AppImage
        run: |
          set -euo pipefail
          APPDIR=Beamish.AppDir
          install -Dm755 target/release/beamish        "$APPDIR/usr/bin/beamish"
          install -Dm644 assets/beamish.desktop        "$APPDIR/usr/share/applications/beamish.desktop"
          install -Dm644 assets/beamish.desktop        "$APPDIR/beamish.desktop"
          install -Dm644 assets/icons/icon_256.png     "$APPDIR/usr/share/icons/hicolor/256x256/apps/beamish.png"
          install -Dm644 assets/icons/icon_256.png     "$APPDIR/beamish.png"
          cat > "$APPDIR/AppRun" <<'SH'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/beamish" "$@"
          SH
          chmod +x "$APPDIR/AppRun"
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          # No FUSE on CI runners -> extract and run the tool directly.
          ./appimagetool-x86_64.AppImage --appimage-extract >/dev/null
          ARCH=x86_64 ./squashfs-root/AppRun "$APPDIR" Beamish-x86_64.AppImage

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/debian/*.deb        dist/ 2>/dev/null || true
          cp target/generate-rpm/*.rpm  dist/ 2>/dev/null || true
          cp Beamish-x86_64.AppImage    dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beamish-linux-packages
          path: dist/*

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false
          generate_release_notes: true
